version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visionbridge_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/vendor
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - visionbridge_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: visionbridge_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - visionbridge_network
    depends_on:
      - app

  db:
    image: mysql:latest
    container_name: visionbridge_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-visionbridge}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${DB_USERNAME:-visionbridge_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-visionbridge_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - visionbridge_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: visionbridge_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME:-visionbridge_user}
      PMA_PASSWORD: ${DB_PASSWORD:-visionbridge_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    networks:
      - visionbridge_network
    depends_on:
      - db

networks:
  visionbridge_network:
    driver: bridge

volumes:
  db_data:
    driver: local
