; Shared hosting (Hostinger) commonly runs multiple PHP-FPM/LSAPI worker
; processes. DeployerController resets OPcache in-process on deploy, but that
; only clears the ONE worker that happened to handle that request — other
; workers serving concurrent real traffic keep stale cached bytecode for a
; regenerated file until they're individually reset or restarted, which is
; why "Undefined variable $hdrProject" kept recurring intermittently after
; `php artisan view:clear` even though the source was already correct.
;
; This makes every worker check the file's mtime on every request instead,
; so a deploy's regenerated files are picked up immediately everywhere —
; the low traffic this app sees makes the per-request stat() cost negligible
; next to the reliability of not serving stale compiled views.
opcache.validate_timestamps=1
opcache.revalidate_freq=0
